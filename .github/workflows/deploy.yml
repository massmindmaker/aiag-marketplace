name: Deploy to VPS

on:
  push:
    branches:
      - master
      - 'exec/plan-*'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build applications
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://test:test@localhost:5432/test' }}

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Create deploy archive
        run: |
          tar czf deploy.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.md' \
            --exclude='**/node_modules/.cache' \
            --exclude='apps/web/.next/cache' \
            .

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload archive to VPS
        env:
          SHA: ${{ github.sha }}
        run: |
          scp deploy.tar.gz ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/srv/aiag/shared/deploy-${SHA}.tar.gz

      - name: Execute remote deployment
        env:
          SHA: ${{ github.sha }}
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE_EOF'
            set -e
            SHA="${{ github.sha }}"

            echo "==> Creating release directories"
            mkdir -p /srv/aiag/web/releases/${SHA}
            mkdir -p /srv/aiag/gateway/releases/${SHA}

            echo "==> Extracting archives"
            tar -xzf /srv/aiag/shared/deploy-${SHA}.tar.gz -C /srv/aiag/web/releases/${SHA}
            tar -xzf /srv/aiag/shared/deploy-${SHA}.tar.gz -C /srv/aiag/gateway/releases/${SHA}

            echo "==> Updating symlinks"
            ln -sfn /srv/aiag/web/releases/${SHA} /srv/aiag/web/current
            ln -sfn /srv/aiag/gateway/releases/${SHA} /srv/aiag/gateway/current

            echo "==> Linking shared environment"
            ln -sf /srv/aiag/shared/.env /srv/aiag/web/releases/${SHA}/apps/web/.env
            ln -sf /srv/aiag/shared/.env /srv/aiag/gateway/releases/${SHA}/packages/api-gateway/.env

            echo "==> Removing deploy archive"
            rm -f /srv/aiag/shared/deploy-${SHA}.tar.gz

            echo "==> Reloading applications via PM2"
            cd /srv/aiag
            pm2 reload ecosystem.config.cjs || pm2 start ecosystem.config.cjs

            echo "==> Cleaning old releases (keep last 5)"
            for svc in web gateway; do
              if [ -d "/srv/aiag/${svc}/releases" ]; then
                cd /srv/aiag/${svc}/releases
                ls -1t | tail -n +6 | xargs -r rm -rf
                cd - > /dev/null
              fi
            done

            echo "==> Deploy finished: ${SHA}"
          REMOTE_EOF
