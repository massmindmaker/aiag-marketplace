# Plan 08 Task 7 — nginx reverse proxy для Grafana на grafana.ai-aggregator.ru.
# SSL — certbot --nginx -d grafana.ai-aggregator.ru.
# Доступ — IP allowlist (edit под owner-IP после установки).
upstream grafana_upstream {
  # Grafana слушает 3010 (порт 3000 занят next-server'ом основного web-приложения).
  server 127.0.0.1:3010;
  keepalive 16;
}

server {
  listen 80;
  server_name grafana.ai-aggregator.ru;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name grafana.ai-aggregator.ru;

  # Fill in by certbot --nginx
  # ssl_certificate /etc/letsencrypt/live/grafana.ai-aggregator.ru/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/grafana.ai-aggregator.ru/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  # IP allowlist — замените на реальные owner/office IP
  # allow 192.0.2.10;
  # allow 192.0.2.20;
  # deny all;

  # Security headers
  add_header X-Frame-Options DENY;
  add_header X-Content-Type-Options nosniff;
  add_header Strict-Transport-Security "max-age=31536000" always;

  client_max_body_size 10M;

  location / {
    proxy_pass http://grafana_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 90s;
  }

  # Grafana Live WebSocket
  location /api/live/ {
    proxy_pass http://grafana_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }
}
